<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Droid Bot</title>
  <style>
    body {
      background-color: #0f172a;
      color: #f1f5f9;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background-color: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      text-align: center;
      max-width: 400px;
    }
    h1 {
      margin-top: 0;
      color: #38bdf8;
    }
    p {
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🤖 Droid Bot</h1>
    <p>Your serverless Discord bot is running successfully on Vercel!</p>
  </div>
</body>
</html>
